name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'feature/**'

jobs:
  verify:
    name: Verify source alpha
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python core
        working-directory: services/python-core
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e .

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Python tests
        working-directory: services/python-core
        run: .venv/bin/python -m unittest discover -s tests -v

      - name: Desktop typecheck
        working-directory: apps/desktop
        run: pnpm check

      - name: Desktop web build
        working-directory: apps/desktop
        run: pnpm build:web

      - name: Rust cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Repository hygiene
        run: ./scripts/maintenance/run-repo-hygiene-check.sh
